name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
      - run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book
      - uses: actions/deploy-pages@v4
