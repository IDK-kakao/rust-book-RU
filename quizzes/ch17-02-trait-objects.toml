type = "MultipleChoice"
prompt.prompt = """
Рассмотрим реализацию универсальной функции двумя способами:

```
fn f_opt1<T: SomeTrait>(t: &T) { /* ... */ }
fn f_opt2(t: &dyn SomeTrait) { /* ... */ }
```

В большинстве случаев, какие из следующих причин являются вескими для предпочтения версии с объектом типажа (`f_opt2`) перед версией с параметром типа (`f_opt1`)? 
Выберите все подходящие варианты.
"""
answer.answer = ["Более быстрое время компиляции", "Меньший размер бинарного файла"]
prompt.distractors = [
    "Улучшение производительности во время выполнения",
    "Улучшение эргономики для разработчика"
]
context = """
Избегая мономорфизации, функции с объектами типажа будут быстрее компилироваться и производить более компактные бинарные файлы. Однако, обычно это достигается за счёт производительности во время выполнения. Объекты типажа редко бывают удобнее для разработчиков, чем универсальные функции с ограничениями типажа.
"""