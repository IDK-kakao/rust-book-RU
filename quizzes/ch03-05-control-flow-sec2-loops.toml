    let a = [5; 10];
    let mut sum = 0;
    for x in a {
        sum += x;
    }
    println!("{sum}");
}
"""
answer.doesCompile = true
answer.stdout = "50"
context = """
Массив `a` содержит элемент `5`, повторённый 10 раз, поэтому его сумма равна `50`. Ответ не `15` — обратите внимание, что синтаксис `[5; 10]` отличается от `[5, 10]`.
"""