id = "a91417cd-cd6d-416b-b72d-4af6b3fb2fd6"
type = "MultipleChoice"
prompt.prompt = """
Если у ссылки время жизни `'static`, это означает:
"""
answer.answer = "Данные, на которые ссылается указатель, никогда не освобождаются"
prompt.distractors = [
  "Данные, на которые ссылается указатель, нельзя изменять",
  "Данные, на которые ссылается указатель, находятся в статической области памяти",
  "Данные, на которые ссылается указатель, не являются динамическими"
]
context = """
`'static` означает «жить в течение всей программы», и поэтому данные по статической ссылке никогда не должны освобождаться. Хотя на практике `'static` ссылки обычно не являются изменяемыми, значение времени жизни `'static` не имеет существенной связи с изменяемостью.
"""

[[questions]]
id = "e521409a-6cbd-48f5-bee0-7fa7f17cc562"
type = "MultipleChoice"
prompt.prompt = """
Рассмотрите следующую неаннотированную сигнатуру функции.

```
struct Foo<'a> {
  bar: &'a i32
}

fn baz(f: Foo) -> &i32 { /* ... */ }
```

Примет ли Rust эту сигнатуру функции? Если да, какие времена жизни он выведет?
"""
answer.answer = """
```
fn baz<'a>(f: Foo<'a>) -> &'a i32
```
  """
prompt.distractors = [
  "Rust отклонит эту сигнатуру функции",
  """
```
fn baz(f: Foo) -> &i32
```
  """,
  """
```
fn baz<'a>(f: Foo<'a>) -> &i32
```
  """,
  """
```
fn baz<'a>(f: Foo) -> &'a i32
```
  """,

]
prompt.answerIndex = 4
context = """
Структура принимает один параметр времени жизни, а выходное значение имеет одно время жизни, поэтому Rust предполагает, что они одинаковы.
"""

