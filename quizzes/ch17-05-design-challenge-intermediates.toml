prompt.prompt = """
Выберите каждый вариант дизайна, который удовлетворяет следующему требованию:

**Требование:** Процесс сериализации должен потреблять как можно меньше памяти.
"""
prompt.distractors = ["1"]
prompt.sortAnswers = true
answer.answer = ["2"]
context = """
Вариант 1 сериализует данные, сначала преобразуя структуру данных в промежуточное представление, `Value`, а затем преобразуя `Value` в конечный формат.
Эта промежуточная структура данных потребляет память, которая не нужна Варианту 2, где данные преобразуются напрямую в конечный формат.
"""
id = "eaa95520-1b72-4f7d-a600-5444b6368785"


[[questions]]
multipart = "q"
type = "MultipleChoice"
prompt.prompt = """
Выберите каждый вариант дизайна, который удовлетворяет следующему требованию:

**Требование:** Когда один и тот же тип данных сериализуется в несколько форматов, это должно увеличивать размер скомпилированного бинарного файла как можно меньше.
"""
prompt.distractors = ["2"]
prompt.sortAnswers = true
answer.answer = ["1"]
context = """
С Вариантом 1 существует только одна инстанциация `Serialize`, которая преобразует тип `T` в `Value`. Поскольку Вариант 2 обобщен по сериализаторам `S`,
то каждый раз, когда `T::serialize` вызывается с новым `S`, компилятор Rust выполнит мономорфизацию нового экземпляра `T::serialize`, что увеличит размер
бинарного файла по сравнению с Вариантом 1.
"""
id = "2751731e-7d18-46a1-aaea-b5734bf51c80"