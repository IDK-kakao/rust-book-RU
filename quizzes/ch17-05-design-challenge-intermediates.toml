[multipart]
q = """
**Контекст:** Вы проектируете библиотеку сериализации, которая преобразует типы данных Rust в форматы, такие как JSON.

**Функциональность:** Типаж `Serialize`, который могут реализовывать сериализуемые типы, и функция `to_json`, которая преобразует сериализуемые типы в JSON.

**Дизайны:** Ниже представлены несколько предложенных дизайнов для реализации функциональности.

```
// Option 1: types serialize to a `Value` enum
pub enum Value {
	String(String),
	Number(isize)
}

pub trait Serialize {
	fn serialize(&self) -> Value;
}

fn value_to_json(value: Value) -> String {
	/* .. */
}

pub fn to_json(data: impl Serialize) -> String {
    let value = data.serialize();
    value_to_json(value)
}


// Option 2: types serialize via calls to a `Serializer` interface
pub trait Serialize {
	fn serialize<S: Serializer>(&self, serializer: &mut S);
}

pub trait Serializer {
	fn serialize_string(&mut self, s: &str);
	fn serialize_number(&mut self, n: isize);
}

struct JsonSerializer { buffer: String };
impl Serializer for JsonSerializer {
	/* .. */
}

pub fn to_json(data: impl Serialize) -> String {
	let mut serializer = JsonSerializer { buffer: String::new() };
	data.serialize(&mut serializer);
	serializer.buffer
}
```
"""

[[questions]]
type = "MultipleChoice"
multipart = "q"
prompt.prompt = """
Выберите каждый вариант дизайна, который удовлетворяет следующему требованию:

**Требование:** Должно быть возможно добавить новый формат данных без необходимости изменять код в существующих реализациях типажа `Serialize`.
"""
prompt.distractors = []
prompt.sortAnswers = true
answer.answer = ["1", "2"]
context = """
Оба дизайна достаточно слабо связаны, так что каждый новый формат данных независим от любых реализаций `Serialize`. Для Варианта 1,
каждый формат данных преобразует `Value` в представление формата. `Value` выступает в качестве границы модуля.

Для Варианта 2, нет явного промежуточного представления сериализованного значения, а скорее каждая реализация `Serialize` явно обобщена
по любому выбору `S`, который реализует `Serializer`.
"""
id = "66e036c9-91a0-4611-8110-967b5ed1a514"

