[[questions]]
id = "7859b06e-72ba-4c07-a3e2-b4f8cb7fd903"
type = "MultipleChoice"
prompt.prompt = """
Вспомните определение типажа `Add`:

```
trait Add<Rhs=Self> {
    type Output;
    fn add(self, rhs: Rhs) -> Self::Output;
}
```

Что из перечисленного лучше всего описывает, почему `Output` является ассоциированным типом, а `Rhs` — параметром типажа?
"""
answer.answer = "Тип `T` должен быть сложим со многими другими типами `S`, но операция `T + S` всегда должна иметь единственный тип результата"
prompt.distractors = [
    "Операция сложения принимает `Rhs` как входной параметр и производит `Output` как выходной, и параметры типажа используются для входных данных, а ассоциированные типы — для выходных",
    "Типаж может иметь только один ассоциированный тип, поэтому `Rhs` должен быть параметром типажа в `Add`",
    "Ассоциированный тип не может иметь значение по умолчанию, в то время как параметр типажа в типаже может иметь значение по умолчанию"
]
context = """
Верно, что ассоциированный тип в настоящее время не может иметь значение по умолчанию, но это не основной побуждающий фактор для того, чтобы `Rhs` был параметром типажа в типаже `Add`.
"""

[[questions]]
id = "d2c77d93-3887-40a2-b93a-501aa315d676"
type = "MultipleChoice"
prompt.prompt = """
Вспомните определение типажа `Add`:

```
trait Add<Rhs=Self> {
    type Output;
    fn add(self, rhs: Rhs) -> Self::Output;
}
```

Что из перечисленного лучше всего описывает, почему `Rhs` является параметром типажа для типажа `Add`, а не параметром функции `add`? То есть, почему `Add` не спроектирован так:

```
trait Add {
    type Output;
    fn add<Rhs>(self, rhs: Rhs) -> Self::Output;
}
```
"""
answer.answer = "Если бы `Rhs` был параметром типа на уровне функции, то определение `add` не могло бы предполагать никакой структуры для `Rhs`"
prompt.distractors = [
    "Проверка типов выполняется более эффективно, когда `Rhs` является параметром типа на уровне типажа, а не на уровне функции",
    "`Rhs` не может иметь тип по умолчанию как параметр типа на уровне функции",
    "Генерация кода для функции `add` потребовала бы дополнительного времени для мономорфизации из-за параметра типа на уровне функции"
]
context = """
Такая конструкция не имела бы большого смысла, потому что `add<Rhs>` не имела бы никакой информации о структуре `Rhs`, поэтому было бы невозможно реализовать какую-либо осмысленную функцию сложения таким способом.
"""

[[questions]]
id = "79db9ca4-693f-4e62-8b8d-356b51a63006"
type = "Tracing"
prompt.program = """
mod inner {
    pub trait A {
        fn f(&self) -> usize { 0 }
    }
    pub trait B {
        fn f(&self) -> usize { 1 }
    }
    pub struct P;
    impl A for P {}
    impl B for P {}
}
fn main() {
    use inner::{P, B};    
    println!("{}", P.f());    
}
"""
answer.doesCompile = true
answer.stdout = "1"
context = """
Когда импортируется только одна из двух конфликтующих реализаций типажа, Rust использует импортированную реализацию. Полностью квалифицированный синтаксис здесь не требуется.
"""

[[questions]]
id = "cb7e4d54-e95b-4153-99d6-e8f380e4f8b4"
type = "MultipleChoice"
prompt.prompt = """
Рассмотрим реализацию типажа `Trait` для типа `T`. В какой из следующих ситуаций
вам нужно обернуть `T` в новый тип (newtype)?
"""
answer.answer = [
    "`Trait` определён во внешнем крейте и `T` определён во внешнем крейте",
]
prompt.distractors = [
    "`Trait` определён в локальном крейте и `T` определён во внешнем крейте",
    "`Trait` определён во внешнем крейте и `T` определён в локальном крейте",
    "`Trait` определён в локальном крейте и `T` определён в локальном крейте",
]
context = """
Правило сиротства (orphan rule) диктует, что типаж не может быть реализован для типа, если оба
определены во внешнем крейте, что требует использования нового типа. Если либо типаж, либо тип
определены локально, то новый тип не требуется.
"""