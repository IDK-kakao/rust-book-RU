[multipart]
q = """
**Контекст:** Вы разрабатываете простой менеджер активов для игрового движка.

**Функциональность:** API-клиент предоставляет пути к активам для загрузки и получает доступ к загруженным активам.

**Предположения:** Вы можете предположить, что загрузки происходят синхронно и мгновенно.

**Варианты дизайна:** Ниже представлены несколько предложенных дизайнов для реализации функциональности.

```
pub struct AssetManager {
    // ...
}

// Вариант 1: вернуть ссылку
impl AssetManager {
    pub fn load(&mut self, path: PathBuf) -> &Asset;
}

// Вариант 2: вернуть изменяемую ссылку
impl AssetManager {
    pub fn load(&mut self, path: PathBuf) -> &mut Asset;
}

// Вариант 3: вернуть умный указатель со счётчиком ссылок
impl AssetManager {
    pub fn load(&mut self, path: PathBuf) -> Rc<Asset>;
}

// Вариант 4: вернуть копируемый дескриптор, который можно преобразовать в ссылку
#[derive(Copy, Clone)]
pub struct AssetHandle(usize);

impl AssetManager {
    pub fn load(&mut self, path: PathBuf) -> AssetHandle;
    pub fn get(&self, handle: AssetHandle) -> &Asset;
}
```
"""

[[questions]]
type = "MultipleChoice"
multipart = "q"
prompt.prompt = """
Выберите каждый вариант дизайна, который удовлетворяет следующему требованию:

**Требование:** После загрузки актив должен быть постоянно неизменяемым.
"""
prompt.distractors = ["2"]
prompt.sortAnswers = true
answer.answer = ["1", "3", "4"]
context = """
Неизменяемость активов обеспечивается типами, которые не разрешают изменяющие операции. Как неизменяемая заимствованная ссылка `&Asset`, так и неизменяемый умный указатель, такой как `Rc`, не разрешают изменяющие операции. Следовательно, Варианты 1, 3 и 4 УДОВЛЕТВОРЯЮТ этому требованию.
Вариант 2 возвращает изменяемую заимствованную ссылку, которая НЕ удовлетворяет требованию.
"""
id = "10ae140e-72a6-4594-802a-d656f33cd836"


[[questions]]
type = "MultipleChoice"
multipart = "q"
prompt.prompt = """
Выберите каждый вариант дизайна, который удовлетворяет следующему требованию:

**Требование:** Клиенты менеджера активов должны сохранять доступ к активам на протяжении нескольких кратковременных заимствований менеджера активов.
"""
prompt.distractors = ["1", "2"]
prompt.sortAnswers = true
answer.answer = ["3", "4"]
context = """
"Сохранять доступ на протяжении заимствований" означает, что клиент хочет написать программу, подобную этой:

```
let asset = {
    let manager = get_manager();
    manager.load("some/path")
};
process_asset(asset);
let another_asset = {
    let manager = get_manager();
    manager.load("another/path")
};
```

В этом случае время жизни значения, возвращаемого `load`, не должно быть привязано ко времени жизни `AssetManager`. Варианты 1 и 2
требуют, чтобы `&Asset` и `&mut Asset` существовали только до тех пор, пока существует `&mut self`. Поэтому проверка заимствований
отклонит программы, подобные приведённой выше, где актив переживает ссылку на менеджер. Варианты 1 и 2 НЕ удовлетворяют требованию.

Варианты 3 и 4 УДОВЛЕТВОРЯЮТ требованию. Время жизни `Rc<Asset>` не привязано ко времени жизни `&mut self`. Аналогично, время жизни
`AssetHandle` не привязано ко времени жизни `&mut self`.
"""
id = "b69cde98-8ccd-4a89-aeeb-80a3338f9e68"


[[questions]]
multipart = "q"
type = "MultipleChoice"
prompt.prompt = """
Выберите каждый вариант дизайна, который удовлетворяет следующему требованию:

**Требование:** Важно, чтобы все активы были освобождены в единый, предсказуемый момент времени.
"""
prompt.distractors = ["3"]
prompt.sortAnswers = true
answer.answer = ["1", "2", "4"]
context = """
Чтобы освободить все активы в единый момент времени, `AssetManager` должен сохранять эксклюзивное владение ими.
Следовательно, когда `AssetManager` удаляется (или иначе получает инструкцию освободить активы), 
гарантируется, что все активы могут быть безопасно удалены.
Варианты 1, 2 и 4 УДОВЛЕТВОРЯЮТ этому требованию. Варианту 4 потребуется, чтобы `AssetManager::get` вызывал панику, если
клиент вызывает `manager.get(handle)` после того, как актив был освобождён. Если есть реальная вероятность, что клиент сделает это,
другой альтернативой было бы, чтобы `get` возвращал `Option<&Asset>`.

Вариант 3 НЕ удовлетворяет этому требованию. Умные указатели со счётчиком ссылок являются совместно владеемыми каждым владельцем `Rc<Asset>`.
У `AssetManager` нет хорошего способа убедиться, что у всех активов нет других владельцев в момент освобождения.
"""
id = "48527488-ecfc-4f16-9824-76a3ac7183f4"