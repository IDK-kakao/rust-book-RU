id = "94934f0f-4db9-48ee-b63e-198ad1a9ffc8"
type = "Tracing"
prompt.program = """
use std::{sync::mpsc, thread};

fn main() {
    let (tx, rx) = mpsc::channel();
    thread::spawn(move || {
        let s = String::from("Hello world");
        tx.send(s.clone()).unwrap();
        tx.send(s.len()).unwrap();
    });
    let s = rx.recv().unwrap();
    let n = rx.recv().unwrap();
    println!("{s} {n}");
}
"""
answer.doesCompile = false
answer.lineNumber = 8
context = """
Каналы могут отправлять значения только одного типа, поэтому `tx.send(s.len())` вызывает ошибку типа.
Если вы хотите отправлять значения разных типов, можно использовать либо перечисление, либо типаж [`Any`](https://doc.rust-lang.org/std/any/trait.Any.html).
"""