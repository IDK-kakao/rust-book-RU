[[questions]]
id = "1ec0098c-c5dc-46de-a889-b6659c0af757"
type = "MultipleChoice"
prompt.prompt = """
Предположим, вы пишете функцию со следующей спецификацией:

> `round_all` принимает на вход список чисел с плавающей точкой и округляет каждое число на месте до ближайшего целого.

Какой из следующих вариантов наиболее подходящая сигнатура типа для функции, реализующей эту спецификацию?
"""
answer.answer = """
```
fn round_all(v: &mut Vec<f32>);
```
"""
prompt.distractors = [
"""
```
fn round_all(v: &Vec<f32>) -> Vec<f32>;
```
""",
"""
```
fn round_all(v: Vec<f32>);
```
""",
"""
```
fn round_all(v: &Vec<f32>);
```
"""
]
context = """
Спецификация требует изменения входных данных на месте, поэтому наиболее подходящая сигнатура типа принимает изменяемую ссылку на входные данные.
Неизменяемая ссылка или владеющий вектор не подходят для этой спецификации.
"""

[[questions]]
id = "f8ca5ab2-0e5d-4c0d-bca2-99e6763ba9c5"
type = "MultipleChoice"
prompt.prompt = """
Предположим, вы пишете функцию со следующей спецификацией:

> `find_contains` принимает на вход коллекцию строк и целевую подстроку.
> Она возвращает список всех строк в коллекции, которые содержат целевую подстроку.

Какой из следующих вариантов наиболее подходящая сигнатура типа для функции, реализующей эту спецификацию?
"""
answer.answer = """
```
fn find_contains(haystack: &[String], needle: &str) -> Vec<&String>;
```
"""
prompt.distractors = [
"""
```
fn find_contains(haystack: &Vec<String>, needle: String) -> Vec<String>;
```
""",
"""
```
fn find_contains(haystack: &[String], needle: &str) -> Vec<String>;
```
""",
"""
```
fn find_contains(haystack: &Vec<String>, needle: &str) -> &[String];
```
"""
]
context = """
Для `haystack` тип среза `&[String]` может принимать больше входных данных, чем `&Vec<String>`, поэтому он предпочтительнее.
Для `needle` целевая подстрока не обязательно должна быть выделена в куче, поэтому `&str` предпочтительнее `String`.
Для возвращаемого типа `Vec<String>` нежелателен, потому что он потребовал бы клонирования входных строк.
`&[String]` нежелателен, потому что он может возвращать только непрерывную подпоследовательность входных данных.
`Vec<&String>` наиболее предпочтителен, потому что он несет только стоимость выделения вектора, а не самих строк.
"""

[[questions]]
id = "868a4edf-16f0-4191-8aed-835c812b8b25"
type = "MultipleChoice"
prompt.prompt = """
Rust обычно запрещает несколько изменяемых доступов к одному и тому же массиву, даже когда эти доступы не пересекаются.
Например, эта функция не компилируется:

```
fn main() {
  let mut v = vec![0, 1, 2, 3];
  let (r0, r1) = (&mut v[0..2], &mut v[2..4]);
  r0[0] += 1;
  r1[0] += 1;  
}
```

Однако в стандартной библиотеке Rust есть функция `slice::split_at_mut`, которая разрешает эту функциональность:

```
fn main() {
  let mut v = vec![0, 1, 2, 3];
  let (r0, r1) = v.split_at_mut(2);
  r0[0] += 1;
  r1[0] += 1;  
}
```

Какой из следующих вариантов лучше всего описывает, как возможно реализовать `split_at_mut`?
"""
answer.answer = "`split_at_mut` использует небезопасный код для обхода проверки заимствований с помощью сырых указателей"
prompt.distractors = [
"`split_at_mut` — это специальный примитив компилятора, который нельзя реализовать внутри языка",
"`split_at_mut` использует небезопасный код для отключения проверки заимствований при проверке безопасности изменяемых ссылок",
"`split_at_mut` вызывает C-библиотеку, которую Rust не может проанализировать"
]
context = """
Как обсуждалось в [Главе 4.3 "Исправление безопасной программы: изменение разных элементов массива"](ch04-03-fixing-ownership-errors.html#fixing-a-safe-program-mutating-different-array-elements), такие функции, как `split_at_mut`, реализуются с помощью возможности `unsafe`.
Эта возможность не полностью отключает проверку заимствований, а скорее позволяет использовать конкретные небезопасные возможности, такие как сырые указатели.
"""

