type = "MultipleChoice"
prompt.prompt = """
Рассмотрим разрешения в следующей программе:

```aquascope,permissions,boundaries,stepper
#fn main() {
let s = String::new();
let s_ref = &s;`(focus,paths:*s_ref)`
#println!("{s_ref}");
#}
```

Какой из следующих вариантов лучше всего объясняет, почему `*s_ref` не имеет разрешения @Perm{own} (владение)?
"""
answer.answer = "Владение разрешает перемещение, а перемещение из ссылки может привести к двойному освобождению"
prompt.distractors = [
  "Владение разрешает заимствование, и повторное заимствование `*s_ref` может привести к двойному освобождению",
  "Владение разрешает изменение, и изменение `*s_ref` может привести к использованию после освобождения",
  "Владение разрешает чтение, и чтение `*s_ref` может привести к использованию после освобождения"
]
context = """
Разрешение @Perm{own} представляет владение объектом. Объектом может быть только один владелец, поэтому важно,
чтобы ссылки не могли передавать владение некопируемыми типами, такими как `String`. Если две переменные считали бы,
что владеют одной и той же строкой, то обе попытались бы её освободить, вызвав двойное освобождение.
"""

