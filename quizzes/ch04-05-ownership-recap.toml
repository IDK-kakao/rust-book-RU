id = "dcfd54f8-7fe6-4483-aefd-ea95ba5b5eb0"
type = "MultipleChoice"
prompt.prompt = """
Функция `transfer_string` отклонена проверкой заимствований:

```rust
fn get_first(strs: &mut (String, String)) -> &mut String {
    &mut strs.0
}

fn get_second(strs: &mut (String, String)) -> &mut String {
    &mut strs.1
}

fn transfer_string(strs: &mut (String, String)) {
    let fst = get_first(strs);
    let snd = get_second(strs);
    fst.push_str(snd);
    snd.clear();
}
```

Представьте, что проверка заимствований не отклонила бы эту функцию.
Определите, существует ли такой вход, при котором выполнение этой функции вызвало бы неопределённое поведение.
"""
answer.answer = "Эта функция НЕ МОЖЕТ вызвать неопределённое поведение"
prompt.distractors = ["Эта функция МОЖЕТ вызвать неопределённое поведение"]
context = """
Проверка заимствований отклоняет эту функцию, потому что она предполагает, что `get_first` и `get_second` могли бы возвращать изменяемую ссылку на любой компонент кортежа, и поэтому `fst` и `snd` могли бы возможно указывать на одно и то же значение. Но они всегда различны в этой программе, поэтому эта функция на самом деле безопасна.
"""