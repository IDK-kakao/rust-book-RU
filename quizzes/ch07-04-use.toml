[[questions]]
id = "a162c2c8-aadf-4963-a997-02a1035f2459"
type = "MultipleChoice"
prompt.prompt = "Какое из следующих утверждений наилучшим образом описывает функцию ключевого слова `use`?"
answer.answer = "`use` уменьшает многословность при обращении к элементам в используемом пути"
prompt.distractors = [
  "`use` копирует содержимое элемента из одного модуля в другой",
  "`use` позволяет получать доступ к элементам, обходя обычные правила приватности",
  "`use` указывает компилятору, что элемент будет использован и должен быть оптимизирован"
]
context = """
`use` позволяет ссылаться на элементы в используемом пути более коротко, чем без `use`, уменьшая многословность ссылки.
"""

[[questions]]
id = "eccc2099-9880-4628-8474-f1d55e2a4a4a"
type = "ShortAnswer"
prompt.prompt = """
Рассмотрим этот модуль и оператор `use`:

```
pub mod parent {
  pub fn a() {}
  fn b() {}
  pub mod child {
    pub fn c() {}
  }
}

fn main() {
  use parent::{*, child as alias};
  // ...
}
```

Внутри `main`, каково общее количество путей, которые могут ссылаться на `a`, `b` или `c` (не включая те, которые используют `self`, `super` или `crate`)?
Запишите ответ в виде цифры, например 0 или 1. Например, если единственными двумя допустимыми путями были `a` и `parent::b`, то ответом было бы 2.
"""
answer.answer = "5"
context = """
Существует два пути к `a`: `parent::a` и `a`. Пути к `b` нет, потому что он приватный. Существует три пути к `c`:
`parent::child::c`, `child::c`, `alias::c`.
"""