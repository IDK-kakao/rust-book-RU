id = "3ee8d846-d282-4de1-8e83-5ca0bc44fc13"
type = "MultipleChoice"
prompt.prompt = """
**Программа 1:**

```ide
/// Возвращает n-й по величине элемент в срезе
fn find_nth<T: Ord + Clone>(elems: &[T], n: usize) -> T {
    elems.sort();
    let t = &elems[n];
    return t.clone();
}
```

Обычно, если вы попытаетесь скомпилировать эту функцию, компилятор вернёт следующую ошибку:

```text
error[E0596]: cannot borrow `*elems` as mutable, as it is behind a `&` reference
 --> test.rs:3:5
  |
3 |     elems.sort();
  |     ^^^^^^^^^^^^ `elems` is a `&` reference, so the data it refers to cannot be borrowed as mutable
```

Предположим, что компилятор НЕ отклонил эту функцию. Какая (если есть) из следующих программ
(1) пройдёт компиляцию и (2) возможно вызовет неопределённое поведение при выполнении?
Отметьте каждую программу, удовлетворяющую обоим критериям, ИЛИ отметьте "Ни одна из этих программ", если ни одна не удовлетворяет.
"""
answer.answer = ["Ни одна из этих программ"]
prompt.distractors = [
"""
```
let v = vec![5, 4, 3, 2, 1];
find_nth(&v, 10);
```
""",
"""
```
let v = vec![5, 4, 3, 2, 1];
find_nth(&v, 0);
println!("{}", v[0]);
```
""",
"""
```
let v = vec![5, 4, 3, 2, 1];
let n = &v[0];
find_nth(&v, 0);
println!("{}", n);
```
""",
]
context = """
Эта программа технически безопасна в отношении памяти, потому что `slice::sort` способен только перемещать
элементы, не освобождая их. Например, `&v[0]` гарантированно указывает на 
*какое-то* число после вызова `find_nth`, даже если это не *исходное* число.

Обратите внимание, что `find_nth(&v, 10)` не вызывает неопределённого поведения, потому что Rust выполняет проверки
при доступе к массиву, поэтому вычисление `&v[10]` приведёт к панике.
"""

