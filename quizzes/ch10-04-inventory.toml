**Программа 1:**

```ide
/// Возвращает n-й по величине элемент в срезе
fn find_nth<T: Ord + Clone>(elems: &[T], n: usize) -> T {
    elems.sort();
    let t = &elems[n];
    return t.clone();
}
```

Какое из следующих исправлений (выделенных жёлтым) лучше всего удовлетворяет этим трём критериям:
1. Исправленная функция проходит компиляцию Rust,
2. Исправленная функция сохраняет намерение исходного кода, и
3. Исправленная функция не вносит ненужных неэффективностей
"""
answer.answer = """
```ide
fn find_nth<T: Ord + Clone>(elems: &[T], n: usize) -> T {
    `[let mut elem_refs: Vec<&T> = elems.iter().collect();]`
    `[elem_refs.sort();]`
    let t = `[elem_refs[n]]`;
    return t.clone();
}
```
"""
