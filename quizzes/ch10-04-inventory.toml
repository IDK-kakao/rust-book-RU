id = "95979d75-5823-4059-a1cf-7e0eba69b41a"
type = "MultipleChoice"
prompt.prompt = """
**Программа 2:**

```ide
struct TestResult {
    /// Оценки студента на тесте
    scores: Vec<usize>,

    /// Возможное значение для подгонки всех оценок
    curve: Option<usize>
}
impl TestResult {  
    pub fn get_curve(&self) -> &Option<usize> { 
        &self.curve 
    }

    /// Если есть подгонка, то увеличивает все 
    /// оценки на значение подгонки
    pub fn apply_curve(&mut self) {
        if let Some(curve) = self.get_curve() {
            for score in self.scores.iter_mut() {
                *score += *curve;
            }
        }
    }
}
```

Если бы вы попытались скомпилировать эту программу, какое из следующих описаний лучше всего соответствует ошибке компилятора, которую вы получили?
"""
answer.answer = "в `apply_curve`, не может заимствовать `self.scores` как изменяемый для `iter_mut`"
prompt.distractors = [
  "в `get_curve`, не может вернуть ссылку на локальную переменную `self.curve`",
  "в `apply_curve`, не может заимствовать `self` как неизменяемый для `get_curve`",
  "в `apply_curve`, `*score` не может быть изменён"
]
context = """
Из-за упрощения времени жизни, функция `get_curve` имеет сигнатуру типа `get_curve<'a>(&'a self) -> &'a Option<usize>`.
Это означает, что вызов `self.get_curve()` расширяет всё заимствование `self`, а не только `self.curve`.
Поэтому `self` неизменно заимствован внутри области видимости `let Some(curve) = ...`, и `self.scores.iter_mut()`
не может быть вызван.
"""

