context = """
Функция вроде `find_nth` явно предназначена быть функцией только для чтения, т.е. для
извлечения некоторого свойства входной последовательности. Любое решение, которое изменяет или отбрасывает входные данные, поэтому не сохраняет намерение исходной функции, даже если
оно более эффективно, чем создание вспомогательного вектора.

Создание `Vec<&T>` предпочтительнее создания `Vec<T>`, поскольку если `T` большой, то
`elems.to_vec()` может быть дорогим. Однако, если бы мы знали, что `T: Copy`, то `to_vec`
было бы предпочтительнее для уменьшения количества разыменований указателей внутри `elems.sort()`.
"""

