[multipart]
q = """
**Контекст:** Вы проектируете простой фреймворк пользовательского интерфейса, состоящий из дерева виджетов, таких как текст и кнопки.

**Функциональность:** API предоставляет `типаж Widget`, который определяет, как работает виджет. Клиент API реализует `типаж Widget` и вызывает его для отрисовки UI.

**Проекты:** Ниже представлены несколько предложенных проектов для реализации функциональности.

```
// Вариант 1: дочерние элементы должны быть Self
pub trait Widget: Sized {
	fn render(&self) -> Vec<Self>;
}

// Вариант 2: дочерние элементы — это параметр типажа
pub trait Widget<Children> {
	fn render(&self) -> Vec<Children>;
}

// Вариант 3: дочерние элементы — это ассоциированный тип
pub trait Widget {
	type Children: Widget;
	fn render(&self) -> Vec<Self::Children>;
}

// Вариант 4: дочерние элементы — это ссылка на объект типажа
pub trait Widget {
	fn render(&self) -> Vec<&dyn Widget>;
}

// Вариант 5: дочерние элементы — это объект типажа в Box
pub trait Widget {
	fn render(&self) -> Vec<Box<dyn Widget>>;
}
```
"""

[[questions]]
type = "MultipleChoice"
multipart = "q"
prompt.prompt = """
Выберите каждый вариант проекта, который удовлетворяет следующему требованию:

**Требование:** От клиента API ожидается предоставление одного перечисления `WidgetImpl`, представляющего все возможные виджеты, и реализация `типажа Widget` для `WidgetImpl`.
"""
prompt.distractors = ["2", "3", "4", "5"]
prompt.sortAnswers = true
answer.answer = ["1"]
context = """
Если мы представляем все возможные виджеты как одно перечисление, например:

```
enum WidgetImpl {
  Button { /* .. */ },
  Text { /* .. */ },
  // ..
}

impl Widget for WidgetImpl { /* .. */ }
```

Тогда у нас есть «закрытая» система, где набор возможных виджетов нерасширяем. Существует только одна реализация `Widget`, и нет необходимости в динамической диспетчеризации.
Поэтому только Вариант 1 имеет смысл, поскольку `render` будет возвращать только другие типы `WidgetImpl`. Все остальные варианты содержат избыточную сложность при этом требовании.
"""
id = "e529cabf-a14c-4f1b-865f-1f376b704df8"

[[questions]]
type = "MultipleChoice"
multipart = "q"
prompt.prompt = """
Выберите каждый вариант проекта, который удовлетворяет следующему требованию:

**Требование:** От клиента API ожидается предоставление уникальной структуры для каждого возможного виджета и реализация `типажа Widget` для каждой структуры.
Каждый виджет может возвращать вектор, содержащий виджеты любого возможного типа.
"""
prompt.distractors = ["1", "2", "3"]
prompt.sortAnswers = true
answer.answer = ["4", "5"]
context = """
В отличие от предыдущего вопроса, теперь мы ожидаем отдельный тип для каждого виджета, например:

```
struct Button { /* .. */ }
impl Widget for Button { /* .. */ }

struct Text { /* .. */ }
impl Widget for Text { /* .. */ }
```

Поэтому вектор виджетов должен быть гетерогенным, то есть он может содержать виджеты различных типов.
Варианты 1, 2 и 3 все ограничивают каждую реализацию `Widget::render` возвратом вектора одного типа виджета.
Варианты 4 и 5 используют динамическую диспетчеризацию через объекты типажа, чтобы разрешить гетерогенные векторы виджетов.
"""
id = "0fdd5ca0-835f-4999-8d24-37841cb0a1a7"

[[questions]]
multipart = "q"
type = "MultipleChoice"
prompt.prompt = """
Выберите каждый вариант проекта, который удовлетворяет следующему требованию:

**Требование:** Из `render` должны возвращаться только типы, которые реализуют `типаж Widget`.
"""
prompt.distractors = ["2"]
prompt.sortAnswers = true
answer.answer = ["1", "3", "4", "5"]
context = """
`Типаж Widget` в Варианте 2 не ограничивает, что `Children: Widget`.
Все остальные варианты обеспечивают возврат `Vec<W>` для некоторого `W`, где `W: Widget`.
"""
id = "fbed1c75-737c-49f5-8f11-66d25391079b"