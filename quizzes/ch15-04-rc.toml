type = "Tracing"
prompt.program = """
use std::rc::Rc;
fn main() {
    let n = Rc::new(1);
    let mut n2 = Rc::clone(&n);
    *n2 += 1;
    println!("{}", n);
}
"""
answer.doesCompile = false
answer.lineNumber = 5
context = """
Данные внутри `Rc` нельзя изменять без использования внутренней изменяемости (см. следующий раздел). `Rc` обеспечивает это свойство, реализуя типаж `Deref`, но не реализует типаж `DerefMut`.
"""

[[questions]]
id = "3b43eb45-3400-4555-b605-9ae1cde7c80c"
type = "Tracing"
prompt.program = """
use std::rc::Rc;
struct Example;
impl Drop for Example {
    fn drop(&mut self) {
        println!("drop");
    }
}
fn main() {
    let x = Rc::new(Example);    
    let y = Rc::clone(&x);    
    println!("A");
    drop(x);
    println!("B");
    drop(y);    
    println!("C");
}
"""
answer.doesCompile = true
answer.stdout = """
A
B
drop
C
"""
context = """
Значение внутри указателя с подсчётом ссылок удаляется только один раз, поэтому «drop» печатается только один раз. Первоначальный `drop(x)` уменьшает счётчик ссылок, но не удаляет значение, потому что `y` всё ещё жив. Затем удаление `y` обнаруживает, что счётчик ссылок равен 0, и удаляет `Example`.
"""