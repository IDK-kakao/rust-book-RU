[[questions]]
id = "bba8893d-f59f-492a-b639-ea04a5c8093b"
type = "Tracing"
prompt.program = """
struct Point {
  x: i32,
  y: i32,
}

fn main() {
  let mut a = Point { x: 1, y: 2 };
  a.x += 1;
  let b = Point { y: 1, ..a };
  a.x += 1;
  println!("{}", b.x);
}
"""
answer.doesCompile = true
answer.stdout = "2"
context = """ 
Синтаксис `..a` копирует каждое поле `a` в `b` (кроме `y`), поэтому второе `a.x += 1` не влияет на `b`.
"""

[[questions]]
id = "77ef68d6-ee7f-4642-8817-73b846c46b2b"
type = "Tracing"
prompt.program = """
struct Point {
  x: i32,
  y: i32,
}

fn main() {
  let mut p = Point { x: 1, y: 2 };
  let x = &mut p.x;
  let y = &mut p.y;
  *x += 1;
  *y += 1;
  println!("{} {}", p.x, p.y);
}
"""
answer.doesCompile = true
answer.stdout = "2 3"
context = """ 
Rust понимает, что `.x` относится к другому объекту, чем `.y`, поэтому допустимо одновременно брать изменяемые ссылки на оба поля.
"""