type = "Tracing"
prompt.program = """
use std::collections::HashMap;
fn main() {
  let mut h: HashMap<char, Vec<usize>> = HashMap::new();
  for (i, c) in "hello!".chars().enumerate() {
    h.entry(c).or_insert(Vec::new()).push(i);
  }
  let mut sum = 0;
  for i in h.get(&'l').unwrap() {
    sum += *i;
  }
  println!("{}", sum);
}
"""
answer.doesCompile = true
answer.stdout = "5"
context = """
Эта программа сохраняет вектор индексов для каждого вхождения заданной буквы в хэшмапу. 
Затем она суммирует все индексы для буквы 'l', которая встречается на индексах 2 и 3 в строке `"hello!"`.
"""