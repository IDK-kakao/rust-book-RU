[[questions]]
id = "5080616f-6f4c-43f7-aa3a-8b23f2798937"
type = "Tracing"
prompt.program = """
fn incr(n: &mut i32) {
  *n += 1;
}

fn main() {
  let mut n = 1;
  incr(&n);
  println!("{n}");
}
"""
answer.doesCompile = false
answer.lineNumber = 7
context = """
Хотя `n` помечен как `mut`, ссылка на `n` также должна быть помечена как `mut`. 
Поэтому корректная версия этой программы должна использовать `incr(&mut n)`.
"""

