type = "MultipleChoice"
prompt.prompt = "Какое ключевое слово используется для функций-конструкторов в Rust?"
answer.answer = "Ни один из перечисленных"
prompt.distractors = [
  "`constructor`",
  "`new`",
  "Имя создаваемого типа",
]
prompt.answerIndex = 3
context = """
В Rust нет ключевого слова для функций-конструкторов. Идиоматический способ определения функции-конструктора — создать ассоциированную функцию с именем `new`, 
но язык не требует этого.
"""

[[questions]]
id = "a506f97d-2b51-4517-bc4d-f69764093c71"
type = "Tracing"
prompt.program = """
struct Point(i32, i32);
fn main() {
  let p = Point(1, 2);

  impl p {
    fn x(&self) -> i32 { self.0 }
  }
  
  println!("{}", p.x());
}
"""
answer.doesCompile = false
answer.lineNumber = 5
context = """ 
Методы можно реализовывать только для типов (например, `impl Point`), а не для переменных (таких как `p`).
"""