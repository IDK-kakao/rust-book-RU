type = "MultipleChoice"
prompt.prompt = """
Рассмотрим этот метод, реализованный для типа `Option`:

```
impl<T> Option<T> {
  fn unwrap_or(self, other: T) -> T {
    match self {
      Some(t) => t,
      None => other
    }
  }
}
```

Какое предложение лучше всего описывает поведение этой функции?
"""
answer.answer = "Возвращает объект внутри `self`, если он существует, и `other` в противном случае"
prompt.distractors = [
  "Возвращает новую опцию, содержащую объект внутри `self`, если он существует, и `other` в противном случае",
  "Вставляет `other` в `self`, если `self` не содержит значение",
  "Возвращает ссылку на объект внутри `self`, если он существует, и `other` в противном случае"
]
context = """
Эта функция «разворачивает» опцию, потребляя владение ею и извлекая внутреннее значение, но если значение отсутствует, то она возвращается к `other`.
Это реальная функция из стандартной библиотеки!
"""

