id = "6e012d34-5c59-443e-85d9-385f0d7dee13"
type = "MultipleChoice"
prompt.prompt = """
Рассмотрим эти две реализации функции для двойного уменьшения беззнакового числа.

```
fn decr_twice_v1(n: u32) -> Option<u32> {
  match n {
    0 => None,
    1 => None,
    n2 => Some(n2 - 2)
  }
}

fn decr_twice_v2(n: u32) -> Option<u32> {
  if n == 0 {
    None
  } else if n == 1 {
    None
  } else {
    Some(n - 2)
  }
}
```

Функции имеют одинаковое поведение для:
"""
answer.answer = "Всех входных данных"
prompt.distractors = [ "Никаких входных данных", "Некоторые, но не все входные данные" ]
context = """
`match` и `if` здесь выполняют одну и ту же функцию. Сопоставление — это специализированный `if`, который проверяет равенство сопоставляемого объекта.
"""