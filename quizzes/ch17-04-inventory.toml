type = "MultipleChoice"
prompt.prompt = """
**Программа 1:**

```ide
/// Добавляет объект, реализующий Display, в вектор 
/// объектов типажа Display
use std::fmt::Display;
fn add_displayable<T: Display>(
    v: &mut Vec<Box<dyn Display>>, 
    t: T
) {
    v.push(Box::new(t));
}
```

Обычно при попытке скомпилировать эту функцию компилятор возвращает следующую ошибку:

```text
error[E0310]: параметр типа `T` может не проживать достаточно долго
 --> test.rs:6:12
  |
6 |     v.push(Box::new(t));
  |            ^^^^^^^^^^^
```

Предположим, что компилятор НЕ отклонил эту функцию. Какая (если есть) из следующих программ
(1) пройдёт компиляцию и (2) возможно вызовет неопределённое поведение при выполнении?
Отметьте каждую программу, удовлетворяющую обоим критериям, ИЛИ отметьте "Ни одна из этих программ", если ни одна не удовлетворяет.
"""
answer.answer = [
"""
```
let mut v: Vec<Box<dyn Display>> = Vec::new();
{
    let n = 0;
    add_displayable(&mut v, &n);
}
println!("{}", v[0]);
```
"""
]
prompt.distractors = [
  "Ни одна из этих программ",
"""
```
let mut v: Vec<Box<dyn Display>> = Vec::new();
{
    let s = String::from("Hello world");
    add_displayable(&mut v, s);
}
println!("{}", v[0]);
```
""",
"""
```
let mut v: Vec<Box<dyn Display>> = Vec::new();
add_displayable(&mut v, 5);
```
"""
]
context = """
Эта программа небезопасна для памяти. Чтобы создать нарушение безопасности памяти, программа должна создать тип `T`, который содержит
ссылки, не переживающие вектор. Например, добавление `&n`, где `n` выходит из области видимости до `v`, означает, что
последующее использование `v[0]` является чтением освобождённой памяти.
"""


