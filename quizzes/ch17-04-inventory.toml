type = "MultipleChoice"
prompt.prompt = """
**Программа 1:**

```ide
/// Добавляет объект, реализующий Display, в вектор 
/// объектов типажа Display
use std::fmt::Display;
fn add_displayable<T: Display>(
    v: &mut Vec<Box<dyn Display>>, 
    t: T
) {
    v.push(Box::new(t));
}
```

Если попытаться скомпилировать эту программу, какое из следующих описаний лучше всего соответствует ошибке компилятора?
"""
answer.answer = "тип `T` не живёт достаточно долго при приведении к объекту типажа"
prompt.distractors = [
  "тип `T` может быть динамически размещён и не может быть приведён к объекту типажа",
  "тип `T` не может быть помещён в Box, если содержит ссылку",
  "тип `T` не переживает время жизни ссылки `&mut Vec<..>`"
]
context = """
При приведении `Box<T>` к `Box<dyn Display>` (неявно в `v.push(..)`) Rust требует, чтобы объект типажа `dyn Display`
переживал вектор. Однако время жизни `T` не указано, поэтому `T` может не проживать достаточно долго.
"""


