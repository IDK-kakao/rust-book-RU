prompt.prompt = """
**Программа 1:**

```ide
/// Добавляет объект, реализующий Display, в вектор 
/// объектов типажа Display
use std::fmt::Display;
fn add_displayable<T: Display>(
    v: &mut Vec<Box<dyn Display>>, 
    t: T
) {
    v.push(Box::new(t));
}
```

Какое из следующих исправлений (подсвечено жёлтым) лучше всего удовлетворяет трём критериям:
1. Исправленная функция проходит компиляцию Rust,
2. Исправленная функция сохраняет замысел исходного кода и
3. Исправленная функция не вносит ненужных неэффективностей
"""
answer.answer = """
```ide
fn add_displayable<`['a]`, T: Display `[+ 'a]`>(
    v: &mut Vec<Box<dyn Display `[+ 'a]`>>, 
    t: T
) {
    v.push(Box::new(t));
}
```
"""
