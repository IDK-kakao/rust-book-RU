context = """
Наиболее идиоматичное исправление — указать, как время жизни `T` должно соотноситься со временем жизни объекта типажа `dyn Display`.
Здесь это означает добавление параметра времени жизни `'a`, указание, что `T` переживает `'a`, и что объекты типажа также живут как минимум
`'a`. 

Использование ограничения `'static` — то же самое, но хуже: это просто менее выразительно, запрещая объектам типажа в векторе
когда-либо содержать ссылки. Помещение времени жизни `'a` на ссылку `&'a mut Vec<..>` неверно и не исправляет ошибку компиляции.
"""