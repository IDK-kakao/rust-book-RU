[[questions]]
id = "05a7959b-4fe7-4ee6-9c25-bfa9a4e72535"
type = "MultipleChoice"
prompt.prompt = """
Какие из перечисленных являются "суперспособностями", которые Rust позволяет использовать внутри блока `unsafe`?
"""
answer.answer = [
    "Разыменование сырого указателя",
    "Вызов функции, помеченной как `unsafe`",
]
prompt.distractors = [
    "Отключение проверки заимствований",
    "Преобразование ссылки в сырой указатель",
]
context = """
Блоки `unsafe` позволяют вам разыменовывать сырые указатели и вызывать `unsafe`-функции. Однако
`unsafe` не отключает проверку заимствований (операции над безопасными ссылками по-прежнему проверяются).
Ссылку можно преобразовать в сырой указатель в обычном безопасном коде.
"""

[[questions]]
id = "7d50567d-d73c-47d4-922f-480e8d1b7919"
type = "Tracing"
prompt.program = """
fn main() {
    let mut v = Vec::with_capacity(4);
    for i in 0 .. 3 { 
        v.push(i); 
    }
    let n = &v[0] as *const i32;
    v.push(4);
    println!("{}", unsafe { *n });
}
"""
answer.doesCompile = true
answer.stdout = "0"
context = """
Эта программа опасна! Она корректно компилируется и выполняется без проблем,
потому что у `Vec` достаточно ёмкости, так что `v.push(4)` не изменяет её размер. Однако,
если бы ёмкость была 3, то `n` указывал бы на освобождённую память.
"""

[[questions]]
id = "015941ed-d375-4070-a8dc-2f368584b302"
type = "MultipleChoice"
prompt.prompt = """
В каких ситуациях использование `unsafe`-кода (или безопасной обёртки вокруг `unsafe`-кода) 
является идиоматическим способом обойти проверку заимствований?
"""
answer.answer = [    
    "Получение двух изменяемых ссылок на непересекающиеся индексы в массиве",
    "Разрешение значений оставаться неинициализированными, когда они не читаются",
    "Наличие ссылки на одно поле структуры внутри другого поля той же самой структуры"
]
prompt.distractors = [
    "Возврат указателя на переменную, выделенную в стеке, из функции",    
]
context = """
Получение двух изменяемых ссылок на непересекающиеся индексы разумно, потому что проверка заимствований не понимает, когда индексы непересекающиеся. См.: [`slice::split_at_mut`](https://doc.rust-lang.org/stable/std/primitive.slice.html#method.split_at_mut).

Разрешение значениям оставаться неинициализированными разумно, потому что проверка заимствований занимает консервативную позицию, что значения всегда должны быть инициализированы, но иногда полезно работать с неинициализированными значениями. См. [`MaybeUninit`](https://doc.rust-lang.org/stable/std/mem/union.MaybeUninit.html) и крейт [`take_mut`](https://docs.rs/take_mut/0.2.2/take_mut/index.html).

Наличие у структуры ссылки на саму себя разумно, потому что проверка заимствований не может
рассуждать о времени жизни самоссылок. См. модуль [`std::pin`](https://doc.rust-lang.org/stable/std/pin/index.html).

Однако возврат указателя на переменную, выделенную в стеке, *никогда* не является допустимым даже с unsafe-кодом. Единственным подходящим обходным путём является использование сборки мусора, например, возврат `Rc<T>` вместо `&T`.
"""