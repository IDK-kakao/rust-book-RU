[[questions]]
id = "e816708d-b0eb-4506-8c33-6ea0df69f14f"
type = "MultipleChoice"
prompt.prompt = """
В Rust фигурная скобка блока, такая как `{ /* ... */ }`, является:
1. Выражением
2. Инструкцией
3. Синтаксической областью видимости
"""
answer.answer = "1 и 3"
prompt.distractors = [ "только 1", "только 2", "2 и 3" ]
context = """
Блок является выражением (#1), которому разрешено содержать инструкции. Он также определяет синтаксическую область видимости для привязок let внутри него (#3).
"""

[[questions]]
id = "42671602-ada3-4943-aa73-28aebcfe5011"
type = "Tracing"
prompt.program = """
fn f(x: i32) -> i32 { x + 1 }
fn main() {
  println!("{}", f({
    let y = 1;
    y + 1
  }));
}
"""
answer.doesCompile = true
answer.stdout = "3"