context = """
Чтобы нарушить безопасность памяти, `remove_zeros` должен быть вызван с вектором, содержащим ноль после первого элемента.
Вызов `v.shrink_to_fit()` освободит память, принадлежащую вектору (из-за изменения размера), что сделает недействительным
итератор `v.iter()`, содержащий указатель на старые данные. Обратите внимание, что чтение вектора `v` после вызова `remove_zeros`
не является существенным для нарушения безопасности, так как проблема внутренняя для `remove_zeros`.
"""

