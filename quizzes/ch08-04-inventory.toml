id = "fb0e3080-7cc8-4338-948e-fae693d137c8"
type = "MultipleChoice"
prompt.prompt = """
**Программа 2:**

```ide
/// Переворачивает элементы вектора на месте
fn reverse(v: &mut Vec<String>) {
    let n = v.len();
    for i in 0 .. n / 2 {
        std::mem::swap(&mut v[i], &mut v[n - i - 1]);
    }
}
```

Если вы попытаетесь скомпилировать эту программу, какое из следующих описаний лучше всего соответствует ошибке компилятора, которую вы получите?
"""
answer.answer = "не может заимствовать `v` как изменяемый дважды для `v[i]` и `v[n - i - 1]`"
prompt.distractors = [
  "не может заимствовать `v` как не изменяемый для `v.len()`, когда `v` является изменяемым заимствованием",
  "не может изменяемо заимствовать элемент `v[i]` изменяемого вектора"
]
context = """
Компилятор не учитывает конкретное значение индексов, используемых для доступа к массиву, поэтому `&mut v[i]`
и `&mut v[n - i - 1]` предполагаются как возможно ссылающиеся на один и тот же элемент. Поэтому мы получаем ошибку,
что `v` не может быть изменяемо заимствовано дважды.
"""

