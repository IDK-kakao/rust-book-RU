type = "MultipleChoice"
prompt.prompt = """
**Программа 1:**

```ide
/// Удаляет все нули на месте из вектора целых чисел.
fn remove_zeros(v: &mut Vec<i32>) {
    for (i, t) in v.iter().enumerate().rev() {
        if *t == 0 {
            v.remove(i);
            v.shrink_to_fit();
        }
    }
}
```

Если вы попытаетесь скомпилировать эту функцию, какое из следующих описаний лучше всего соответствует ошибке компилятора, которую вы получите?
"""
answer.answer = "`v.remove(i)` не может заимствовать `v` как изменяемый"
prompt.distractors = [
  "`v` не живёт достаточно долго, чтобы вызвать `v.remove(i)`",
  "`t` не может быть разыменован, пока `i` жив",
  "`v.iter()` не может быть вызван для изменяемой ссылки"
]
context = """
Функция `v.iter()` не изменяемо заимствует вектор `v` на время цикла for. Однако `v.remove(i)` требует изменяемую ссылку на `v`. Поэтому `v.remove(i)` не может заимствовать `v` как изменяемый, так как это конфликтовало бы с итератором.
"""

