[[questions]]
id = "2e273ac2-6f06-4c19-a831-1d44eed89323"
type = "MultipleChoice"
prompt.prompt = """
Рассмотрите права доступа в следующей программе:

```aquascope,permissions,stepper
#fn main() {
let mut s = String::from("Hello");
let t = &mut s;
/* здесь */
t.push_str(" world");
println!("{}", s);
#}
```

В точке, отмеченной `/* здесь */`, какие права доступа есть на пути `s`? Выберите каждое право доступа ниже или выберите "нет прав доступа", 
если у пути нет прав доступа.
"""
answer.answer = ["Нет прав доступа"]
prompt.distractors = ["R", "W", "O"]
prompt.answerIndex = 3
context = """
Изменяемое заимствование `t = &mut s` удаляет все права доступа на `s`, пока `t` активно."
"""

[[questions]]
id = "b431f43e-9a6f-4715-ae88-8896fca6ff3b"
type = "MultipleChoice"
prompt.prompt = """
Рассмотрите права доступа в следующей программе:

```aquascope,permissions,stepper,boundaries
fn get_first(v: &Vec<String>) -> &String {
    &v[0]
}

fn main() {
    let mut strs = vec![
        String::from("A"), String::from("B")
    ];
    let first = get_first(&strs);
    if first.len() > 0 {
        strs.push(String::from("C"));
    }
}
```

Какое из следующих объяснений лучше всего описывает, почему `strs` теряет и снова получает права на запись?
"""
answer.answer = "`get_first` возвращает неизменяемую ссылку на данные внутри `strs`, поэтому `strs` не является изменяемым, пока `first` активно"
prompt.distractors = [
  "`strs` не является изменяемым, пока неизменяемая ссылка `&strs`, переданная в `get_first`, активна",
  "`strs` не нуждаются в правах на запись до операции `strs.push(..)`, поэтому он снова получает права на запись только в этой инструкции",
  "Поскольку `first` ссылается на `strs`, то `strs` может быть изменён только внутри вложенной области видимости, такой как if-выражение"
]
context = """
Когда вызывается `get_first`, Rust понимает, что возвращаемая строка `first` может указывать на данные внутри `strs`, поэтому `strs` теряет 
права на запись. Как только переменная `first` больше не используется (после условия if), то `strs` снова получает права на запись.
"""

[[questions]]
id = "652e596c-7cc9-42e6-a7f8-701879cd9a2b"
type = "MultipleChoice"
prompt.prompt = """
Рассмотрите эту небезопасную программу:
```aquascope,interpreter,shouldFail
#fn main() {
let v1 = vec![1, 2, 3];
let mut v2 = v1;
v2.push(4);
println!("{}", v1[0]);`[]`    
#}
```

Какое из следующих описаний лучше всего характеризует момент, в который в этой программе происходит неопределённое поведение?
"""
answer.answer = "`v1[0]` читает `v1`, который указывает на освобождённую память"
prompt.distractors = [
  "`v2` владеет данными вектора в куче, в то время как `v1` не владеет",
  "`v1` был перемещён в `v2` в строке 2",
  "`v1` имеет свой указатель недействительным из-за `push` в строке 3"
]
context = """
Неопределённое поведение возникает потому, что `v1` читается после освобождения. Обратите внимание, что остальные три варианта являются верными утверждениями 
о программе, но они не объясняют, почему на самом деле происходит неопределённое поведение. Например, если бы `println` был удалён, 
то остальные три варианта всё ещё были бы верны, но программа больше не имела бы неопределённого поведения.
"""