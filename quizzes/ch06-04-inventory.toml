```ide
/// Создает строку-разделитель для строк текста,
/// возвращая значение по умолчанию, если предоставленная строка пуста
fn make_separator(user_str: &str) -> &str {
    if user_str == "" {
        let default = "=".repeat(10);
        &default
    } else {
        user_str
    }
}
```

Если бы вы попытались скомпилировать эту функцию, какое из следующих описаний наилучшим образом соответствует ошибке компилятора, которую вы получите?
