  "функция `make_separator` не может вернуть две разные ссылки"
]
context = """
Поскольку `default` находится в стеке внутри `make_separator`, она будет освобождена после завершения вызова `make_separator`.
Это оставляет `&default` указывающим на освобожденную память. Поэтому Rust жалуется, что нельзя вернуть ссылку на локальную переменную.
"""

