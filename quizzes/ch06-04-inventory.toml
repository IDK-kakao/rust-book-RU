**Программа 2:**

```ide
/// Извлекает строку из option, если она существует,
/// возвращая значение по умолчанию в противном случае
fn get_or_default(arg: &Option<String>) -> String {
    if arg.is_none() {
        return String::new();
    }
    let s = arg.unwrap();
    s.clone()
}
```

Если бы вы попытались скомпилировать эту функцию, какое из следующих описаний наилучшим образом соответствует ошибке компилятора, которую вы получите?
"""
answer.answer = "нельзя переместить из `arg` в `arg.unwrap()`"
prompt.distractors = [
  "нельзя вызвать `arg.is_none()` без разыменования `arg`",
  "`arg` не живет достаточно долго",
  "нельзя вернуть `s.clone()`, который не живет достаточно долго"
]
context = """
Функция `Option::unwrap` ожидает `self`, то есть ожидает владение `arg`. Однако `arg` — это неизменяемая ссылка на option,
поэтому она не может предоставить владение option. Поэтому компилятор жалуется, что мы 
не можем переместиться из `arg` через `unwrap`.
"""

