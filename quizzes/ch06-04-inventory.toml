context = """
Нет допустимого способа вернуть указатель на переменную, размещенную в стеке. Поэтому простое решение — изменить тип возвращаемого значения на `String`
и скопировать входной `user_str` во владеющую строку. Однако требование, чтобы `user_str` был `String`, снижает гибкость API, например.
вызывающий не сможет вызвать `make_separator` для подстроки большей строки. Это также потребует от вызывающих выделения строк в куче, например.
они не смогут использовать строковый литерал вроде `make_separator("Rust")`.

Наиболее идиоматичное решение этой проблемы использует конструкцию, которую вы еще не видели: [`Cow`](https://doc.rust-lang.org/std/borrow/enum.Cow.html).
Умный указатель "клонировать-при-записи" позволит этой функции возвращать *либо* владеющую строку *либо* ссылку на строку без ошибки типа.
"""

