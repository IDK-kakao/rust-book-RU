context = """
Комбинация `is_none` и `unwrap` здесь является антипаттерном Rust, так как `match` объединяет оба функционала и
автоматически занимается проталкиванием ссылки `&Option` внутрь, чтобы произвести `&String`. Поэтому решение с `match`
наиболее идиоматично и проходит компиляцию без изменения предполагаемой сигнатуры типа функции.

Решение изменения `&Option` на `Option` нежелательно, потому что оно требует от вызывающего предоставить владение своим option,
что является гораздо более ограничивающим API.
"""